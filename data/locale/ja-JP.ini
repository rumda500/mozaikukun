ObjectCategoryDesc="検出するクラスを絞り込みます。顔検出モデルを使う場合は「Face」を選択してください。COCOモデルを使う場合は対象クラス（Person など）を選択してください。"
MaskingGroupDesc="検出領域にエフェクトを適用します。チェックをONにすると有効になります。"
MaskingTypeDesc="検出領域に適用するエフェクトの種類を選択します。"
MaskingBlurRadiusDesc="ぼかし・ピクセル化の強さです。値が大きいほど強くぼかします（最大64）。"
MaskScaleDesc="検出矩形をどれだけ拡大してマスクするかの倍率です。顔の端が漏れる場合は大きくしてください。デフォルト: 1.3（30%拡大）。"
MaskShapeDesc="マスクの形状を選びます。楕円にすると顔の形に自然にフィットします。"
InvertMaskDesc="マスクを反転します。検出された顔ではなく背景にエフェクトをかけます。背景ぼかし（ポートレートモード）として使えます。"
DilationIterationsDesc="マスク領域を外側に何回膨張させるかです。検出枠の端でエフェクトが漏れる場合に増やします。"
ConfThresholdDesc="検出を採用する最小信頼度です。低くすると検出しやすくなりますが誤検知が増えます。高くすると精度が上がりますが見落としが増えます。"
MinSizeThresholdDesc="これより面積（ピクセル数）が小さい検出を無視します。小さな誤検知を除外するのに使います。"
InferenceDeviceDesc="AIモデルを実行するハードウェアを選びます。Windowsでは GPU (DirectML) が最も高速です。エラーが出る場合はCPUに切り替えてください。"
ModelSizeDesc="使用するAIモデルを選びます。「顔検出」（デフォルト）はYuNetを使った高速な顔専用モデルです。COCOモデルは人・車など80クラスを検出できます。"



