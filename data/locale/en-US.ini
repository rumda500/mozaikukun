ObjectCategoryDesc="Filter detections by class. With the Face Detection model, select 'Face'. With COCO models, select the object class to mask (e.g. Person)."
MaskingGroupDesc="Apply a visual effect over the detected region."
MaskingTypeDesc="Effect to apply over the detected region."
MaskingBlurRadiusDesc="Strength of the blur or pixelation effect. Higher = stronger."
MaskScaleDesc="Expand the mask rectangle beyond the detected boundary. Increase if the face leaks through the edges of the mosaic. Default: 1.3 (30% larger)."
MaskShapeDesc="Shape of the mask region: rectangle or ellipse. Ellipse fits the face shape more naturally."
InvertMaskDesc="Invert the mask — apply the effect to the background instead of the detected object. Useful for portrait/background-blur mode."
DilationIterationsDesc="Number of times to expand the mask outward (morphological dilation). Useful for closing small gaps at the edges."
ConfThresholdDesc="Minimum confidence score to accept a detection. Lower = more sensitive but more false positives. Higher = fewer detections but more accurate."
MinSizeThresholdDesc="Ignore detections whose bounding box area (in pixels) is smaller than this value. Useful to discard tiny false positives."
InferenceDeviceDesc="Hardware to run the AI model on. GPU (DirectML) is fastest on Windows. Fall back to CPU if there are errors."
ModelSizeDesc="AI model to use. 'Face Detection' (default) uses YuNet for fast face-only detection. COCO models detect 80 object classes (person, car, etc.)."



